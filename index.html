<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#0a0a12">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Malandro Radio">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Malandro Radio - 24/7 Live</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{--accent:#ff8a00;--accent2:#ff2e6a;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;
  background:#07070d;color:#fff;min-height:100vh;min-height:100dvh;overflow:hidden;
  display:flex;flex-direction:column;align-items:center;justify-content:space-between;
  padding:max(22px,env(safe-area-inset-top)) 20px max(26px,env(safe-area-inset-bottom));}
#bg{position:fixed;inset:-20%;z-index:-2;background:radial-gradient(ellipse at 50% 25%,#1b1230,#07070d 75%);}
.top{width:100%;max-width:560px;display:flex;align-items:center;justify-content:space-between;}
.brand{font-weight:900;letter-spacing:2px;font-size:19px;}
.brand b{color:var(--accent);}
.live{display:flex;align-items:center;gap:7px;font-size:13px;font-weight:800;letter-spacing:1.5px;
  background:rgba(255,46,106,.16);padding:5px 12px;border-radius:20px;color:#ff6a8a;}
.live .dot{width:9px;height:9px;border-radius:50%;background:#ff2e6a;animation:blink 1.2s infinite;}
@keyframes blink{50%{opacity:.3;}}
.stage{position:relative;width:min(86vw,520px);aspect-ratio:16/9;margin:8px 0;border-radius:18px;
  overflow:hidden;background:#15151f;box-shadow:0 24px 70px rgba(0,0,0,.6),0 0 0 1px rgba(255,255,255,.06);}
#ytframe{position:absolute;inset:0;width:100%;height:100%;border:0;}
/* tap-to-listen veil over the player until the user starts audio */
#veil{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:14px;background:linear-gradient(135deg,rgba(255,138,0,.92),rgba(255,46,106,.92));cursor:pointer;z-index:3;
  text-align:center;padding:18px;transition:opacity .35s;}
#veil.hide{opacity:0;pointer-events:none;}
#veil .big{width:74px;height:74px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;
  box-shadow:0 12px 34px rgba(0,0,0,.35);}
#veil .big svg{width:34px;height:34px;color:#ff2e6a;}
#veil .vtext{font-weight:900;font-size:18px;letter-spacing:.5px;}
#veil .vsub{font-size:13px;opacity:.9;font-weight:600;}
.meta{width:100%;max-width:560px;text-align:center;}
.show{font-size:13px;letter-spacing:3px;text-transform:uppercase;color:var(--accent);font-weight:800;}
#title{font-size:22px;font-weight:900;margin-top:6px;line-height:1.2;}
#sub{font-size:14px;color:#b9b9c6;margin-top:4px;font-weight:600;}
.controls{display:flex;flex-direction:column;align-items:center;gap:16px;width:100%;max-width:560px;}
#play{width:74px;height:74px;border-radius:50%;border:none;cursor:pointer;
  background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;
  display:flex;align-items:center;justify-content:center;box-shadow:0 12px 34px rgba(255,90,40,.45);transition:transform .12s;}
#play:active{transform:scale(.93);}
#play svg{width:34px;height:34px;}
.vol{display:flex;align-items:center;gap:12px;width:80%;max-width:340px;color:#888;font-size:12px;font-weight:700;}
.vol input{flex:1;-webkit-appearance:none;height:5px;border-radius:4px;background:rgba(255,255,255,.18);}
.vol input::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:#fff;}
.hint{font-size:12px;color:#666;text-align:center;line-height:1.5;}
</style>
</head>
<body>
<div id="bg"></div>

<div class="top">
  <div class="brand"><b>MALANDRO</b> RADIO</div>
  <div class="live"><span class="dot"></span>LIVE 24/7</div>
</div>

<div class="stage">
  <!-- The channel's CURRENT live broadcast. The video already carries the now-playing overlay. -->
  <iframe id="ytframe" allow="autoplay; encrypted-media; picture-in-picture"
    src="https://www.youtube.com/embed/live_stream?channel=UC-FEh1l2E4Iy7ZbDt-nHelg&enablejsapi=1&playsinline=1&autoplay=1&mute=1&rel=0&modestbranding=1&iv_load_policy=3"></iframe>
  <div id="veil">
    <div class="big"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg></div>
    <div class="vtext">TAP TO LISTEN</div>
    <div class="vsub">Puro Malandro - barrio radio, live</div>
  </div>
</div>

<div class="meta">
  <div class="show" id="show">24/7 LIVE</div>
  <div id="title">Malandro Entertainment Radio</div>
  <div id="sub">Corridos - Cumbias - Oldies - hosted live</div>
</div>

<div class="controls">
  <button id="play" aria-label="Play/Pause">
    <svg id="ico" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
  </button>
  <div class="vol"><span>VOL</span><input id="vol" type="range" min="0" max="100" value="90"><span id="volv">90</span></div>
  <div class="hint">Add to your home screen to listen like an app. Donde vive el barrio.</div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
const PLAY='M8 5v14l11-7z', PAUSE='M6 5h4v14H6zM14 5h4v14h-4z';
const ico=document.getElementById('ico'), veil=document.getElementById('veil');
const volEl=document.getElementById('vol'), volv=document.getElementById('volv');
let player=null, ready=false, playing=false;

function onYouTubeIframeAPIReady(){
  player=new YT.Player('ytframe',{events:{
    'onReady':()=>{ ready=true; try{player.setVolume(+volEl.value);}catch(e){} },
    'onStateChange':e=>{ playing=(e.data===YT.PlayerState.PLAYING); setIcon(playing); }
  }});
}
function setIcon(p){ ico.setAttribute('d',p?PAUSE:PLAY); }

function start(){
  if(!ready) return;
  try{ player.unMute(); player.setVolume(+volEl.value); player.playVideo(); }catch(e){}
  veil.classList.add('hide');
}
veil.onclick=start;
document.getElementById('play').onclick=()=>{
  if(!ready) return;
  if(playing){ player.pauseVideo(); }
  else{ player.unMute(); player.setVolume(+volEl.value); player.playVideo(); veil.classList.add('hide'); }
};
volEl.oninput=()=>{ volv.textContent=volEl.value; if(ready){ try{player.setVolume(+volEl.value); if(+volEl.value>0)player.unMute();}catch(e){} } };

if('serviceWorker' in navigator){ navigator.serviceWorker.register('sw.js').catch(()=>{}); }
</script>
</body>
</html>
